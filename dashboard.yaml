title: 🏊 Piscine
views:
  - title: Synoptique
    path: synoptique
    icon: mdi:pool
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: entity
                entity: binary_sensor.piscine_181_esp_piscine_connecte
                name: ESP 181
                icon: mdi:cpu-32-bit
                state_color: true
              - type: entity
                entity: binary_sensor.piscine_233_mouillezalin_status
                name: Blue Connect
                icon: mdi:bluetooth-connect
                state_color: true
              - type: entity
                entity: binary_sensor.piscine_181_pompe_en_fonctionnement
                name: Pompe
                icon: mdi:pump
                state_color: true
              - type: entity
                entity: binary_sensor.piscine_181_alarme_pression_filtre
                name: ⚠ Filtre
                icon: mdi:gauge-full
                state_color: true
              - type: entity
                entity: sensor.piscine_233_mouillezalin_last_update
                name: Mesure BLE
                icon: mdi:clock-check
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.piscine_181_alarme_pression_filtre
                state: 'on'
            card:
              type: markdown
              content: >
                ## ⚠️ ALARME — Pression filtre élevée ! Vérifiez l'état du
                filtre à sable. Pression : **{{
                states('sensor.piscine_181_pression_filtre') }} Bar**
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.piscine_233_mouillezalin_temperature
                name: 🌊 Eau (BLE)
                unit: °C
                min: 0
                max: 35
                needle: true
                segments:
                  - from: 0
                    color: '#2196F3'
                  - from: 18
                    color: '#4CAF50'
                  - from: 28
                    color: '#FF9800'
                  - from: 32
                    color: '#F44336'
              - type: gauge
                entity: sensor.piscine_181_tdeg_piscine
                name: 🌡 Eau (Dallas)
                unit: °C
                min: 0
                max: 35
                needle: true
                segments:
                  - from: 0
                    color: '#2196F3'
                  - from: 18
                    color: '#4CAF50'
                  - from: 28
                    color: '#FF9800'
                  - from: 32
                    color: '#F44336'
              - type: gauge
                entity: sensor.tdeg_exterieur
                name: ☀️ Extérieur
                unit: °C
                min: -10
                max: 45
                needle: true
                segments:
                  - from: -10
                    color: '#2196F3'
                  - from: 15
                    color: '#4CAF50'
                  - from: 30
                    color: '#FF9800'
                  - from: 38
                    color: '#F44336'
              - type: gauge
                entity: sensor.piscine_181_production_solaire
                name: ⚡ Solaire
                unit: W
                min: 0
                max: 6000
                needle: true
                segments:
                  - from: 0
                    color: '#9E9E9E'
                  - from: 500
                    color: '#FF9800'
                  - from: 1000
                    color: '#4CAF50'
                  - from: 3000
                    color: '#8BC34A'
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.piscine_233_mouillezalin_ph
                name: pH
                min: 6.5
                max: 8.5
                needle: true
                segments:
                  - from: 6.5
                    color: '#F44336'
                  - from: 7
                    color: '#FF9800'
                  - from: 7.1
                    color: '#4CAF50'
                  - from: 7.5
                    color: '#FF9800'
                  - from: 7.8
                    color: '#F44336'
              - type: gauge
                entity: sensor.piscine_233_mouillezalin_chlore_libre_redox_orp
                name: ORP / RedOx
                unit: mV
                min: 400
                max: 950
                needle: true
                segments:
                  - from: 400
                    color: '#F44336'
                  - from: 550
                    color: '#FF9800'
                  - from: 650
                    color: '#4CAF50'
                  - from: 800
                    color: '#FF9800'
              - type: gauge
                entity: sensor.piscine_233_mouillezalin_chlorine
                name: Chlore libre
                unit: PPM
                min: 0
                max: 5
                needle: true
                segments:
                  - from: 0
                    color: '#F44336'
                  - from: 0.5
                    color: '#FF9800'
                  - from: 1
                    color: '#4CAF50'
                  - from: 3
                    color: '#FF9800'
                  - from: 4
                    color: '#F44336'
              - type: gauge
                entity: sensor.piscine_233_mouillezalin_salinite
                name: Salinité
                unit: g/L
                min: 0
                max: 8
                needle: true
                segments:
                  - from: 0
                    color: '#F44336'
                  - from: 3
                    color: '#FF9800'
                  - from: 4
                    color: '#4CAF50'
                  - from: 5.5
                    color: '#FF9800'
                  - from: 6.5
                    color: '#F44336'
              - type: gauge
                entity: sensor.piscine_233_mouillezalin_conductivite
                name: Conductivité
                unit: µS/cm
                min: 0
                max: 10000
                needle: true
                segments:
                  - from: 0
                    color: '#9E9E9E'
                  - from: 3000
                    color: '#4CAF50'
                  - from: 7000
                    color: '#FF9800'
                  - from: 9000
                    color: '#F44336'
          - type: horizontal-stack
            cards:
              - type: entity
                entity: sensor.piscine_233_mouillezalin_ph_statut
                name: Statut pH
                icon: mdi:ph
              - type: entity
                entity: sensor.piscine_233_mouillezalin_chlore_libre_statut
                name: Statut ORP
                icon: mdi:biohazard
              - type: entity
                entity: sensor.piscine_233_mouillezalin_salinite_statut
                name: Statut Salinité
                icon: mdi:shaker-outline
              - type: entity
                entity: sensor.piscine_233_mouillezalin_batterie
                name: Batterie BLE
                icon: mdi:battery-bluetooth-variant
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.piscine_181_pression_filtre
                name: 💧 Pression filtre
                unit: Bar
                min: 0
                max: 2.5
                needle: true
                segments:
                  - from: 0
                    color: '#4CAF50'
                  - from: 1
                    color: '#FF9800'
                  - from: 1.5
                    color: '#F44336'
              - type: entities
                title: ⚙️ Équipements
                show_header_toggle: false
                entities:
                  - entity: switch.pompe_piscine
                    name: Pompe filtration
                    icon: mdi:pump
                  - entity: switch.activation_electrolyseur_sel
                    name: Électrolyseur sel
                    icon: mdi:lightning-bolt-circle
                  - entity: switch.pompe_dosage_acide_base
                    name: Pompe dosage pH
                    icon: mdi:ph
                  - entity: switch.piscine_181_eclairage_piscine
                    name: Éclairage piscine
                    icon: mdi:lightbulb
                  - entity: select.piscine_181_mode_fonctionnement_filtration
                    name: Mode filtration
                    icon: mdi:cog-sync
                  - entity: sensor.piscine_181_plage_horaire_filtration
                    name: Plage active
                    icon: mdi:clock-time-four
  - title: Qualité eau
    path: qualite-eau
    icon: mdi:water-check
    cards:
      - type: entities
        title: 📡 Sonde Blue Connect (piscine-233)
        show_header_toggle: false
        entities:
          - entity: binary_sensor.piscine_233_mouillezalin_status
            name: Connecté
            icon: mdi:bluetooth-connect
          - entity: sensor.piscine_233_mouillezalin_last_update
            name: Dernière mesure
            icon: mdi:clock-check
          - entity: sensor.piscine_233_mouillezalin_batterie
            name: Batterie sonde
            icon: mdi:battery-bluetooth-variant
          - entity: switch.piscine_233_mouillezalin_enable
            name: Activer lecture BLE
            icon: mdi:bluetooth
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.piscine_233_mouillezalin_ph
            name: pH
            min: 6.5
            max: 8.5
            needle: true
            segments:
              - from: 6.5
                color: '#F44336'
              - from: 7
                color: '#FF9800'
              - from: 7.1
                color: '#4CAF50'
              - from: 7.5
                color: '#FF9800'
              - from: 7.8
                color: '#F44336'
          - type: gauge
            entity: sensor.piscine_233_mouillezalin_chlore_libre_redox_orp
            name: ORP (mV)
            min: 400
            max: 950
            needle: true
            segments:
              - from: 400
                color: '#F44336'
              - from: 550
                color: '#FF9800'
              - from: 650
                color: '#4CAF50'
              - from: 800
                color: '#FF9800'
          - type: gauge
            entity: sensor.piscine_233_mouillezalin_chlorine
            name: Chlore (PPM)
            min: 0
            max: 5
            needle: true
            segments:
              - from: 0
                color: '#F44336'
              - from: 0.5
                color: '#FF9800'
              - from: 1
                color: '#4CAF50'
              - from: 3
                color: '#FF9800'
              - from: 4
                color: '#F44336'
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.piscine_233_mouillezalin_salinite
            name: Salinité (g/L)
            min: 0
            max: 8
            needle: true
            segments:
              - from: 0
                color: '#F44336'
              - from: 3
                color: '#FF9800'
              - from: 4
                color: '#4CAF50'
              - from: 5.5
                color: '#FF9800'
              - from: 6.5
                color: '#F44336'
          - type: gauge
            entity: sensor.piscine_233_mouillezalin_conductivite
            name: Conductivité (µS/cm)
            min: 0
            max: 10000
            needle: true
            segments:
              - from: 0
                color: '#9E9E9E'
              - from: 3000
                color: '#4CAF50'
              - from: 7000
                color: '#FF9800'
              - from: 9000
                color: '#F44336'
          - type: gauge
            entity: sensor.piscine_233_mouillezalin_temperature
            name: T° eau (BLE)
            unit: °C
            min: 0
            max: 35
            needle: true
            segments:
              - from: 0
                color: '#2196F3'
              - from: 18
                color: '#4CAF50'
              - from: 28
                color: '#FF9800'
              - from: 32
                color: '#F44336'
      - type: glance
        title: 🚦 Statuts qualité
        show_state: true
        entities:
          - entity: sensor.piscine_233_mouillezalin_ph_statut
            name: pH
            icon: mdi:ph
          - entity: sensor.piscine_233_mouillezalin_chlore_libre_statut
            name: ORP
            icon: mdi:biohazard
          - entity: sensor.piscine_233_mouillezalin_salinite_statut
            name: Salinité
            icon: mdi:shaker-outline
      - type: markdown
        title: 🎯 Valeurs cibles
        content: >
          | Paramètre | 🔴 Trop bas | 🟢 Idéal | 🔴 Trop haut |
          |-----------|------------|---------|------------| | **pH** | < 7.1 |
          7.1 — 7.5 | > 7.5 | | **ORP / RedOx** | < 550 mV | 650 — 800 mV | >
          800 mV | | **Chlore libre** | < 0.5 PPM | 1 — 3 PPM | > 4 PPM | |
          **Salinité** | < 3 g/L | 4 — 5.5 g/L | > 6.5 g/L | | **T° eau** | <
          18°C | 24 — 28°C | > 32°C |
      - type: history-graph
        title: 📈 pH et ORP (7 jours)
        hours_to_show: 168
        entities:
          - entity: sensor.piscine_233_mouillezalin_ph
            name: pH
          - entity: sensor.piscine_233_mouillezalin_chlore_libre_redox_orp
            name: ORP (mV)
      - type: history-graph
        title: 📈 Chlore / Salinité / Conductivité (7j)
        hours_to_show: 168
        entities:
          - entity: sensor.piscine_233_mouillezalin_chlorine
            name: Chlore (PPM)
          - entity: sensor.piscine_233_mouillezalin_salinite
            name: Salinité (g/L)
          - entity: sensor.piscine_233_mouillezalin_conductivite
            name: Conductivité (µS/cm)
      - type: history-graph
        title: 📈 Température eau (7j)
        hours_to_show: 168
        entities:
          - entity: sensor.piscine_233_mouillezalin_temperature
            name: T° eau (BLE)
          - entity: sensor.piscine_181_tdeg_piscine
            name: T° eau (Dallas)
          - entity: sensor.tdeg_exterieur
            name: T° extérieure
  - title: Filtration
    path: filtration
    icon: mdi:water-sync
    cards:
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.piscine_181_pression_filtre
            name: 💧 Pression filtre
            unit: Bar
            min: 0
            max: 2.5
            needle: true
            segments:
              - from: 0
                color: '#4CAF50'
              - from: 1
                color: '#FF9800'
              - from: 1.5
                color: '#F44336'
          - type: gauge
            entity: sensor.piscine_181_production_solaire
            name: ☀️ Solaire
            unit: W
            min: 0
            max: 6000
            needle: true
            segments:
              - from: 0
                color: '#9E9E9E'
              - from: 500
                color: '#FF9800'
              - from: 1000
                color: '#4CAF50'
      - type: entities
        title: 🕐 Mode & Horaires
        entities:
          - entity: select.piscine_181_mode_fonctionnement_filtration
            name: Mode actif
            icon: mdi:cog-sync
          - entity: sensor.piscine_181_plage_horaire_filtration
            name: Plage active
            icon: mdi:clock-time-four
          - type: divider
          - entity: time.piscine_181_heure_pivot
            name: Heure pivot
            icon: mdi:clock-outline
          - entity: time.piscine_181_heure_debut_filtration
            name: Début calculé
            icon: mdi:clock-start
          - entity: time.piscine_181_heure_fin_filtration
            name: Fin calculée
            icon: mdi:clock-end
          - entity: time.piscine_181_duree_filtration
            name: Durée calculée
            icon: mdi:timelapse
          - type: divider
          - entity: time.piscine_181_debut_mode_horaire
            name: Début mode horaire
            icon: mdi:calendar-clock
          - entity: time.piscine_181_duree_mode_horaire
            name: Durée mode horaire
            icon: mdi:timer
      - type: entities
        title: 🔢 Paramètres
        entities:
          - entity: number.piscine_181_coefficient_filtration
            name: Coefficient filtration (%)
            icon: mdi:percent
          - entity: number.piscine_181_tempo_recirculation
            name: Tempo recirculation (s)
            icon: mdi:clock-fast
          - entity: number.piscine_181_seuil_solaire_filtration
            name: Seuil solaire (W)
            icon: mdi:solar-power
          - entity: sensor.piscine_181_temps_filtration_journalier
            name: Filtration aujourd'hui
            icon: mdi:timer
      - type: horizontal-stack
        cards:
          - type: button
            entity: switch.piscine_181_arret_force_filtration
            name: Arrêt forcé
            icon: mdi:stop-circle
            tap_action:
              action: toggle
            show_state: true
          - type: button
            entity: button.piscine_181_arret_filtration_journee
            name: Arrêt journée
            icon: mdi:weather-sunny-off
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.piscine_181_arret_filtration_journee
          - type: entity
            entity: number.piscine_181_duree_arret_journalier
            name: Durée arrêt (h)
            icon: mdi:timer-off
      - type: history-graph
        title: 📈 Pompe + Pression (24h)
        hours_to_show: 24
        entities:
          - entity: binary_sensor.piscine_181_pompe_en_fonctionnement
            name: Pompe active
          - entity: sensor.piscine_181_pression_filtre
            name: Pression (Bar)
      - type: history-graph
        title: 📈 Production solaire (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.piscine_181_production_solaire
            name: Production (W)
  - title: Équipements
    path: equipements
    icon: mdi:toggle-switch
    cards:
      - type: glance
        title: ⚡ État équipements
        show_state: true
        columns: 3
        entities:
          - entity: switch.pompe_piscine
            name: Pompe
            icon: mdi:pump
          - entity: switch.activation_electrolyseur_sel
            name: Électrolyseur
            icon: mdi:lightning-bolt-circle
          - entity: switch.pompe_dosage_acide_base
            name: Dosage pH
            icon: mdi:ph
          - entity: switch.piscine_181_eclairage_piscine
            name: Lumière
            icon: mdi:lightbulb
          - entity: switch.piscine_181_arret_force_filtration
            name: Arrêt forcé
            icon: mdi:stop-circle
          - entity: binary_sensor.piscine_181_pompe_en_fonctionnement
            name: Pompe active
            icon: mdi:engine
      - type: entities
        title: 🎮 Commandes
        show_header_toggle: false
        entities:
          - entity: switch.pompe_piscine
            name: Pompe filtration
            icon: mdi:pump
            secondary_info: last-changed
          - entity: switch.activation_electrolyseur_sel
            name: Électrolyseur sel
            icon: mdi:lightning-bolt-circle
            secondary_info: last-changed
          - entity: switch.pompe_dosage_acide_base
            name: Pompe dosage pH
            icon: mdi:ph
            secondary_info: last-changed
          - entity: switch.piscine_181_eclairage_piscine
            name: Éclairage piscine
            icon: mdi:lightbulb
            secondary_info: last-changed
          - type: divider
          - entity: select.piscine_181_mode_fonctionnement_filtration
            name: Mode filtration
            icon: mdi:water-sync
          - entity: switch.piscine_181_arret_force_filtration
            name: Arrêt forcé filtration
            icon: mdi:stop-circle-outline
          - type: divider
          - entity: select.piscine_181_mode_hors_gel
            name: Mode hors gel
            icon: mdi:snowflake-alert
      - type: entities
        title: ⚡ Électrolyseur
        entities:
          - entity: switch.activation_electrolyseur_sel
            name: État électrolyseur
            icon: mdi:lightning-bolt-circle
            secondary_info: last-changed
          - entity: number.piscine_181_duree_max_electrolyseur
            name: Durée max avant pause (min)
            icon: mdi:timer-pause
          - entity: number.piscine_181_seuil_temperature_electrolyseur
            name: Seuil T° activation (°C)
            icon: mdi:thermometer-water
          - entity: sensor.piscine_181_tdeg_piscine
            name: T° eau actuelle
            icon: mdi:pool-thermometer
  - title: Surveillance
    path: surveillance
    icon: mdi:eye
    cards:
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.tdeg_exterieur
            name: 🌡 T° extérieure
            unit: °C
            min: -15
            max: 45
            needle: true
            segments:
              - from: -15
                color: '#1565C0'
              - from: -2
                color: '#2196F3'
              - from: 1
                color: '#4CAF50'
              - from: 25
                color: '#FF9800'
              - from: 38
                color: '#F44336'
          - type: entities
            title: ❄️ Protection hors gel
            entities:
              - entity: select.piscine_181_mode_hors_gel
                name: Mode
                icon: mdi:snowflake
              - entity: number.piscine_181_seuil_gel_leger
                name: Seuil 1 — léger (15 min)
                icon: mdi:thermometer-low
              - entity: number.piscine_181_seuil_gel_severe
                name: Seuil 2 — sévère (30 min)
                icon: mdi:thermometer-minus
      - type: entities
        title: 💧 Pression filtre
        entities:
          - entity: sensor.piscine_181_pression_filtre
            name: Pression actuelle
            icon: mdi:gauge
          - entity: binary_sensor.piscine_181_alarme_pression_filtre
            name: Alarme haute pression
            icon: mdi:alert-circle
            secondary_info: last-changed
      - type: history-graph
        title: 📈 Températures (7j)
        hours_to_show: 168
        entities:
          - entity: sensor.piscine_233_mouillezalin_temperature
            name: 🌊 Eau (BLE)
          - entity: sensor.piscine_181_tdeg_piscine
            name: 🌡 Eau (Dallas)
          - entity: sensor.tdeg_exterieur
            name: ☀️ Extérieure
      - type: history-graph
        title: 📈 Pression filtre (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.piscine_181_pression_filtre
            name: Pression (Bar)
  - title: Environnement
    path: environnement
    icon: mdi:weather-partly-cloudy
    cards:
      - type: glance
        title: 🌤 Station météo locale (BME280 ESP-181)
        show_state: true
        entities:
          - entity: sensor.piscine_181_temperature_exterieure
            name: Température
            icon: mdi:thermometer
          - entity: sensor.piscine_181_humidite_exterieure
            name: Humidité
            icon: mdi:water-percent
          - entity: sensor.piscine_181_pression_atmospherique
            name: Pression atm.
            icon: mdi:gauge
          - entity: sensor.piscine_181_humidite_absolue
            name: Hum. absolue
            icon: mdi:water
          - entity: sensor.piscine_181_point_de_rosee
            name: Point rosée
            icon: mdi:thermometer-alert
      - type: history-graph
        title: 📈 Températures (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.piscine_181_tdeg_piscine
            name: 🌊 Eau (Dallas)
          - entity: sensor.piscine_233_mouillezalin_temperature
            name: 🌊 Eau (BLE)
          - entity: sensor.tdeg_exterieur
            name: 🌡 Extérieure
          - entity: sensor.piscine_181_point_de_rosee
            name: 💧 Point rosée
      - type: history-graph
        title: 📈 Humidité (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.piscine_181_humidite_exterieure
            name: Humidité relative (%)
          - entity: sensor.piscine_181_humidite_absolue
            name: Humidité absolue (g/m³)
      - type: history-graph
        title: 📊 Pression atmosphérique (48h)
        hours_to_show: 48
        entities:
          - entity: sensor.piscine_181_pression_atmospherique
            name: Pression (hPa)
  - title: Diagnostic
    path: diagnostic
    icon: mdi:stethoscope
    cards:
      - type: entities
        title: 🖥 ESP32 piscine-181
        entities:
          - entity: binary_sensor.piscine_181_esp_piscine_connecte
            name: Connexion ESP-181
            icon: mdi:wifi
          - entity: sensor.piscine_181_synchro_horloge_ha
            name: Synchro horloge
            icon: mdi:timer-sync
          - entity: sensor.piscine_181_extinction_automatique
            name: Extinction programmée à
            icon: mdi:power-sleep
      - type: entities
        title: 📡 ESP32 piscine-233 (Blue Connect)
        entities:
          - entity: binary_sensor.piscine_233_mouillezalin_status
