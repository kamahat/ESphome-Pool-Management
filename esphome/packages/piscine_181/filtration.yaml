# packages/piscine_181/filtration.yaml
# Modes : Palier | Classique | Abaque | Horaire | Marche Force | Arret Force
#
# P0 mode_choc ON      -> Pompe ON  (ignore abaque + solaire)
# P1 ent_at_force ON   -> Pompe OFF
# P2 g_flag_hg ON      -> Pompe ON  (hors_gel.yaml)
# P3 Arret Force       -> Pompe OFF
# P4 Marche Force      -> Pompe ON
# P5 Palier/Classique/Abaque -> calcul duree + solaire + pivot
# P6 Horaire           -> plage fixe
#
# Mode Abaque :
#   duree_base  = polynome(T) * coeff_filtration/100
#   duree_cible = duree_base * coef_marge  (defaut 1.4)
#   duree_cible = clamp(duree_cible, duree_min_h, duree_max_h)
#   Avant heure_butoir_complement : solaire + fenetre pivot
#   Apres heure_butoir_complement : si cumule < cible -> pompe ON (ignore solaire)

globals:
  - id: g_memoire_temp_eau
    type: float
    restore_value: yes
    initial_value: '25'

  - id: flag_tempo_ppe_filtre
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: g_ble_temp_last_update
    type: int
    restore_value: no
    initial_value: '0'

  - id: g_tps_filtration
    type: float
    restore_value: no
    initial_value: '8'

  - id: g_temps_max_filtration
    type: float
    initial_value: '23'

  - id: g_temps_min_filtration
    type: float
    initial_value: '5'

  - id: g_temp_palier1
    type: float
    initial_value: '10'
  - id: g_temp_palier2
    type: float
    initial_value: '15'
  - id: g_temp_palier3
    type: float
    initial_value: '20'
  - id: g_temp_palier4
    type: float
    initial_value: '25'
  - id: g_tps_palier1
    type: float
    initial_value: '1'
  - id: g_tps_palier2
    type: float
    initial_value: '4'
  - id: g_tps_palier3
    type: float
    initial_value: '8'
  - id: g_tps_palier4
    type: float
    initial_value: '12'
  - id: g_tps_palier5
    type: float
    initial_value: '14'

  - id: g_abaque_a
    type: float
    initial_value: '0.00335'
  - id: g_abaque_b
    type: float
    initial_value: '-0.14953'
  - id: g_abaque_c
    type: float
    initial_value: '2.43489'
  - id: g_abaque_d
    type: float
    initial_value: '-10.72859'

  - id: g_hh
    type: int
    initial_value: '0'
  - id: g_mm
    type: int
    initial_value: '0'
  - id: g_ss
    type: int
    initial_value: '0'

  - id: g_complement_actif
    type: bool
    restore_value: yes
    initial_value: 'false'

select:
  - platform: template
    name: "Mode Fonctionnement Filtration"
    id: _Mode_Fonctionnement_filtration
    optimistic: true
    restore_value: true
    options:
      - "Palier"
      - "Classique"
      - "Abaque"
      - "Horaire"
      - "Marche Force"
      - "Arret Force"
    on_value:
      then:
        - script.execute: _fonctionnement_filtration
        - logger.log:
            format: "FILTRATION: Mode -> %s"
            args: [ 'id(_Mode_Fonctionnement_filtration).current_option()' ]
            level: INFO

datetime:
  - platform: template
    id: heure_pivot
    type: time
    name: "Heure Pivot"
    optimistic: yes
    initial_value: "13:30:00"
    restore_value: true

  - platform: template
    id: h_debut
    type: time
    name: "Heure Debut Filtration"
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  - platform: template
    id: h_fin
    type: time
    name: "Heure Fin Filtration"
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  - platform: template
    id: duree_filtration_calc
    type: time
    name: "Duree Filtration"
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  - platform: template
    id: debut_mode_horaire
    type: time
    name: "Debut Mode Horaire"
    optimistic: yes
    initial_value: "08:00:00"
    restore_value: true

  - platform: template
    id: duree_mode_horaire
    type: time
    name: "Duree Mode Horaire"
    optimistic: yes
    initial_value: "08:00:00"
    restore_value: true

  - platform: template
    id: heure_butoir_complement
    type: time
    name: "Heure Butoir Complement"
    optimistic: yes
    initial_value: "18:00:00"
    restore_value: true

number:
  - platform: template
    name: "Tempo Recirculation"
    id: tempo_mesure_temp
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 900
    unit_of_measurement: "s"
    step: 10
    icon: mdi:clock
    initial_value: 120

  - platform: template
    name: "Coefficient Filtration"
    id: coeff_filtration
    optimistic: true
    restore_value: true
    mode: box
    min_value: 50
    max_value: 150
    unit_of_measurement: "%"
    step: 5
    icon: mdi:percent
    initial_value: 100

  - platform: template
    name: "Duree Arret Journalier"
    id: duree_at_jour
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 24
    unit_of_measurement: "h"
    step: 0.5
    initial_value: 4

  - platform: template
    name: "Seuil Solaire Filtration"
    id: seuil_solaire
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 5000
    unit_of_measurement: "W"
    step: 50
    icon: mdi:solar-power
    initial_value: 1000

  - platform: template
    name: "Coefficient Marge Filtration"
    id: coef_marge
    optimistic: true
    restore_value: true
    mode: box
    min_value: 1.0
    max_value: 1.6
    step: 0.05
    icon: mdi:chart-bar
    initial_value: 1.4

  - platform: template
    name: "Duree Min Filtration"
    id: duree_min_h
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 12
    unit_of_measurement: "h"
    step: 0.5
    icon: mdi:timer-minus-outline
    initial_value: 6

  - platform: template
    name: "Duree Max Filtration"
    id: duree_max_h
    optimistic: true
    restore_value: true
    mode: box
    min_value: 12
    max_value: 24
    unit_of_measurement: "h"
    step: 0.5
    icon: mdi:timer-plus-outline
    initial_value: 22

switch:
  - platform: template
    name: "Mode Choc Filtration"
    id: mode_choc
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:alert
    on_turn_on:
      then:
        - logger.log:
            format: "MODE CHOC: Active -> Pompe 24/24"
            level: WARN
        - script.execute: _fonctionnement_filtration
    on_turn_off:
      then:
        - logger.log:
            format: "MODE CHOC: Desactive -> retour normal"
            level: INFO
        - script.execute: _fonctionnement_filtration

button:
  - platform: template
    name: "Arret Filtration Journee"
    id: _arret_jour
    on_press:
      then:
        - switch.template.publish:
            id: ent_at_force
            state: ON
        - logger.log:
            format: "FILTRATION: Arret jour %.1f h"
            args: [ 'id(duree_at_jour).state' ]
            level: INFO
        - delay: !lambda "return id(duree_at_jour).state * 3600000;"
        - switch.template.publish:
            id: ent_at_force
            state: OFF
        - logger.log:
            format: "FILTRATION: Fin arret jour"
            level: INFO

interval:
  - interval: 5s
    then:
      - script.execute: _fonctionnement_filtration
      - script.execute: _memorisation_temperature_eau

script:
  - id: _memorisation_temperature_eau
    then:
      - if:
          condition:
            lambda: 'return id(flag_tempo_ppe_filtre) && !isnan(id(temp_piscine).state);'
          then:
            - lambda: 'id(g_memoire_temp_eau) = id(temp_piscine).state;'
            - logger.log:
                format: "TEMP: Dallas T=%.1fC"
                args: [ 'id(g_memoire_temp_eau)' ]
                level: DEBUG
          else:
            - if:
                condition:
                  lambda: |-
                    if (isnan(id(temp_eau_ble).state)) return false;
                    if (!id(ha_time).now().is_valid())  return false;
                    if (id(g_ble_temp_last_update) == 0) return false;
                    int age = id(ha_time).now().timestamp - id(g_ble_temp_last_update);
                    return age < 3600;
                then:
                  - lambda: 'id(g_memoire_temp_eau) = id(temp_eau_ble).state;'
                  - logger.log:
                      format: "TEMP: BLE T=%.1fC age=%ds"
                      args: [ 'id(g_memoire_temp_eau)',
                              'id(ha_time).now().timestamp - id(g_ble_temp_last_update)' ]
                      level: DEBUG
                else:
                  - logger.log:
                      format: "TEMP: BLE indispo -> conservation %.1fC"
                      args: [ 'id(g_memoire_temp_eau)' ]
                      level: DEBUG

  - id: _fonctionnement_filtration
    then:
      # P0 - Mode Choc
      - if:
          condition:
            and:
              - lambda: 'return id(mode_choc).state;'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg);'
          then:
            - switch.turn_on: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Mode-Choc");'

      # P1 - Arret force manuel
      - if:
          condition:
            lambda: 'return id(ent_at_force).state;'
          then:
            - switch.turn_off: cde_ppe_filtration

      # P2 - Hors gel
      - if:
          condition:
            lambda: 'return id(g_flag_hg);'
          then:
            - switch.turn_on: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Hors-Gel");'

      # P3 - Arret Force (mode select)
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Arret Force";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg) && !id(mode_choc).state;'
          then:
            - switch.turn_off: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Arret_force");'

      # P4 - Marche Force (mode select)
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Marche Force";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg) && !id(mode_choc).state;'
          then:
            - switch.turn_on: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Marche_force");'

      # P5 - Palier
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Palier";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg) && !id(mode_choc).state;'
          then:
            - lambda: |-
                float t = id(g_memoire_temp_eau);
                if      (t < id(g_temp_palier1)) id(g_tps_filtration) = id(g_tps_palier1);
                else if (t < id(g_temp_palier2)) id(g_tps_filtration) = id(g_tps_palier2);
                else if (t < id(g_temp_palier3)) id(g_tps_filtration) = id(g_tps_palier3);
                else if (t < id(g_temp_palier4)) id(g_tps_filtration) = id(g_tps_palier4);
                else                             id(g_tps_filtration) = id(g_tps_palier5);
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
            - logger.log:
                format: "FILTRATION Palier: T=%.1f -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            - script.execute: _calcul_hdebut_hfin

      # P5 - Classique (T/2) + condition solaire
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Classique";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg) && !id(mode_choc).state;'
          then:
            - lambda: |-
                id(g_tps_filtration) = id(g_memoire_temp_eau) / 2.0;
                id(g_tps_filtration) = min(id(g_temps_max_filtration), max(id(g_temps_min_filtration), id(g_tps_filtration)));
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
            - logger.log:
                format: "FILTRATION Classique: T=%.1f -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            - if:
                condition:
                  lambda: 'return id(seuil_solaire).state > 0 && id(production_solaire).state < id(seuil_solaire).state;'
                then:
                  - switch.turn_off: cde_ppe_filtration
                  - logger.log:
                      format: "Classique: Solaire %.0fW < %.0fW -> OFF"
                      args: [ 'id(production_solaire).state', 'id(seuil_solaire).state' ]
                      level: INFO
                else:
                  - script.execute: _calcul_hdebut_hfin

      # P5 - Abaque + coef_marge + complement nuit
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Abaque";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg) && !id(mode_choc).state;'
          then:
            - lambda: |-
                float t = id(g_memoire_temp_eau);
                float duree_base = id(g_abaque_a)*pow(t,3) + id(g_abaque_b)*pow(t,2)
                                 + id(g_abaque_c)*t + id(g_abaque_d);
                duree_base *= id(coeff_filtration).state / 100.0f;
                float duree_cible = duree_base * id(coef_marge).state;
                duree_cible = min(id(duree_max_h).state, max(id(duree_min_h).state, duree_cible));
                id(g_tps_filtration) = duree_cible;
                ESP_LOGI("filtration", "Abaque: T=%.1f base=%.2fh cible=%.2fh (x%.2f)",
                  t, duree_base, duree_cible, id(coef_marge).state);
            - lambda: |-
                if (!id(ha_time).now().is_valid()) return;
                int now_min = id(ha_time).now().hour * 60 + id(ha_time).now().minute;
                int but_min = id(heure_butoir_complement).hour * 60 + id(heure_butoir_complement).minute;
                float cible_s = id(g_tps_filtration) * 3600.0f;
                float cumul_s = id(_temps_fonctionnement_ppe_piscine_jour).state;
                if (now_min >= but_min) {
                  bool nouveau = (cumul_s < cible_s);
                  if (nouveau != id(g_complement_actif))
                    ESP_LOGI("filtration", "Complement: %s (%.1fh/%.1fh)",
                      nouveau ? "ACTIF" : "COMPLET", cumul_s/3600.0f, cible_s/3600.0f);
                  id(g_complement_actif) = nouveau;
                }
            - if:
                condition:
                  lambda: |-
                    return id(g_complement_actif)
                      && (id(_temps_fonctionnement_ppe_piscine_jour).state < id(g_tps_filtration) * 3600.0f);
                then:
                  - switch.turn_on: cde_ppe_filtration
                  - lambda: |-
                      char buf[48];
                      snprintf(buf, sizeof(buf), "Complt %.1fh/%.1fh",
                        id(_temps_fonctionnement_ppe_piscine_jour).state / 3600.0f,
                        id(g_tps_filtration));
                      id(aff_heure_filtration).publish_state(buf);
                else:
                  - if:
                      condition:
                        lambda: 'return id(seuil_solaire).state > 0 && id(production_solaire).state < id(seuil_solaire).state;'
                      then:
                        - switch.turn_off: cde_ppe_filtration
                        - logger.log:
                            format: "Abaque: Solaire %.0fW < %.0fW -> OFF"
                            args: [ 'id(production_solaire).state', 'id(seuil_solaire).state' ]
                            level: INFO
                      else:
                        - script.execute: _calcul_hdebut_hfin

      # P6 - Horaire
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Horaire";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg) && !id(mode_choc).state;'
          then:
            - datetime.time.set:
                id: h_debut
                time: !lambda |-
                  return {second: 0, minute: id(debut_mode_horaire).minute,
                          hour: id(debut_mode_horaire).hour};
            - datetime.time.set:
                id: h_fin
                time: !lambda |-
                  int total = id(h_debut).hour * 60 + id(h_debut).minute
                            + id(duree_mode_horaire).hour * 60 + id(duree_mode_horaire).minute;
                  return {second: 0, minute: static_cast<uint8_t>(total % 60),
                          hour: static_cast<uint8_t>((total / 60) % 24)};
            - lambda: |-
                char buf[24];
                snprintf(buf, sizeof(buf), "%02u:%02u -> %02u:%02u",
                  id(h_debut).hour, id(h_debut).minute,
                  id(h_fin).hour,   id(h_fin).minute);
                id(aff_heure_filtration).publish_state(buf);
            - script.execute: _calcul_ma_at_ppe_filtration

  - id: _calcul_hdebut_hfin
    mode: single
    then:
      - datetime.time.set:
          id: heure_pivot
          time: !lambda |-
            return {second: 0, minute: id(heure_pivot).minute, hour: id(heure_pivot).hour};
      - lambda: |-
          double p = id(heure_pivot).hour * 60.0 + id(heure_pivot).minute;
          double d = p - id(g_tps_filtration) * 30.0;
          if (d < 0) d += 1440;
          id(g_hh) = (int)(d / 60) % 24;
          id(g_mm) = (int)d % 60;
      - datetime.time.set:
          id: h_debut
          time: !lambda |-
            return {second: 0, minute: static_cast<uint8_t>(id(g_mm)),
                    hour: static_cast<uint8_t>(id(g_hh))};
      - lambda: |-
          double p = id(heure_pivot).hour * 60.0 + id(heure_pivot).minute;
          double f = p + id(g_tps_filtration) * 30.0;
          id(g_hh) = (int)(f / 60) % 24;
          id(g_mm) = (int)f % 60;
      - datetime.time.set:
          id: h_fin
          time: !lambda |-
            return {second: 0, minute: static_cast<uint8_t>(id(g_mm)),
                    hour: static_cast<uint8_t>(id(g_hh))};
      - lambda: 'CONVERT_SECONDS(id(g_tps_filtration) * 3600, id(g_hh), id(g_mm), id(g_ss));'
      - datetime.time.set:
          id: duree_filtration_calc
          time: !lambda |-
            return {second: 0, minute: static_cast<uint8_t>(id(g_mm)),
                    hour: static_cast<uint8_t>(id(g_hh))};
      - lambda: |-
          char buf[32];
          snprintf(buf, sizeof(buf), "%02u:%02u / %02u:%02u / %02u:%02u",
            id(h_debut).hour, id(h_debut).minute,
            id(heure_pivot).hour, id(heure_pivot).minute,
            id(h_fin).hour, id(h_fin).minute);
          id(aff_heure_filtration).publish_state(buf);
      - logger.log:
          format: "FILTRATION: %02u:%02u -[%02u:%02u]- %02u:%02u (%.2fh)"
          args: [ 'id(h_debut).hour', 'id(h_debut).minute',
                  'id(heure_pivot).hour', 'id(heure_pivot).minute',
                  'id(h_fin).hour', 'id(h_fin).minute', 'id(g_tps_filtration)' ]
          level: INFO
      - script.execute: _calcul_ma_at_ppe_filtration

  - id: _calcul_ma_at_ppe_filtration
    mode: single
    then:
      - if:
          condition:
            time.has_time:
          else:
            - logger.log:
                format: "FILTRATION: heure non sync, pompe inchangee"
                level: WARN
      - if:
          condition:
            - lambda: 'return id(ha_time).now().is_valid();'
            - lambda: |-
                int now   = id(ha_time).now().hour * 60 + id(ha_time).now().minute;
                int debut = id(h_debut).hour * 60 + id(h_debut).minute;
                int fin   = id(h_fin).hour   * 60 + id(h_fin).minute;
                return (fin >= debut) ? (now >= debut && now < fin)
                                      : (now >= debut || now < fin);
          then:
            - switch.turn_on: cde_ppe_filtration
          else:
            - switch.turn_off: cde_ppe_filtration
