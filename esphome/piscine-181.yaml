# ============================================================
# piscine-181.yaml
# ESP32 WROOM 32U / az-delivery-devkit-v4 / Carte R4G4DL
#
# GPIO:  25=Lumière  26=pH  33=Electrolyse  32=Pompe
#        4=LED  12=Buzzer  13=Dallas  16=RX  17=TX
#        21=SDA  22=SCL
# I2C:   ADS1115@0x48  BME280@0x76
# ============================================================

substitutions:
  device_name:        piscine-${net.octet1}
  friendly_name:      esp_${net.octet1}
  device_description: "Pilotage Piscine Local Piscine"
  device_area:        "Piscine"
  board:              az-delivery-devkit-v4
  pression_max:       "1.5"
  net:
    octet1: "181"
    IP1:    192.168.80.${net.octet1}

esphome:
  name:    ${device_name}
  area:    ${device_area}
  comment: ${device_description}
  on_boot:
    priority: 200
    then:
      # Macro CONVERT_SECONDS requise par filtration.yaml
      - lambda: |-
          #define CONVERT_SECONDS(total_seconds, hh, mm, ss) \
          do { \
            int total = static_cast<int>(total_seconds); \
            hh = total / 3600; \
            int r = total % 3600; \
            mm = r / 60; \
            ss = r % 60; \
            hh = std::min(hh, 23); \
            mm = std::min(mm, 59); \
            ss = std::min(ss, 59); \
          } while (0)

packages:
  wifi:            !include common/wifi-iot.yaml
  device_base:     !include common/base.yaml
  esp32:           !include common/esp32.yaml
  network_service: !include common/network-service.yaml
  capteurs:        !include packages/piscine_181/capteurs.yaml
  lumiere:         !include packages/piscine_181/lumiere.yaml
  pompe:           !include packages/piscine_181/pompe.yaml
  filtration:      !include packages/piscine_181/filtration.yaml
  electrolyse:     !include packages/piscine_181/electrolyse.yaml
  hors_gel:        !include packages/piscine_181/hors_gel.yaml

esp32:
  board: ${board}
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_key_esp-181

ota:
  - platform: esphome
    password: !secret ota_esp-181

logger:
  level: debug
  logs:
    component: ERROR

status_led:
  pin:
    number: GPIO4
    inverted: true

output:
  - platform: ledc
    pin: GPIO12
    id: rtttl_out

uart:
  - id: mod_bus
    rx_pin: GPIO16
    tx_pin: GPIO17
    baud_rate: 115200
    data_bits: 8
    parity: NONE

one_wire:
  - platform: gpio
    pin: GPIO13
    id: onewire_bus

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: i2c_1

ads1115:
  - address: 0x48

# Time centralisé ici pour éviter la fragmentation des on_time entre packages
time:
  - platform: homeassistant
    id: ha_time

    on_time_sync:
      if:
        condition:
          time.has_time:
        then:
          - text_sensor.template.publish:
              id: ${friendly_name}_text_sensor_shutdown
              state: "00h05"
          - text_sensor.template.publish:
              id: ${friendly_name}_text_in_sync
              state: "Synchro Time avec Home Assistant"
          - logger.log: "TIME: Synchronisé avec Home Assistant"
          - script.execute: _fonctionnement_filtration

    on_time:
      # Toutes les 5 min : timer protection électrolyseur
      - seconds: 0
        minutes: /5
        then:
          - lambda: |-
              if (!id(electrolyse_relay).state) return;
              if (id(electrolyse_running_time) > id(electrolyse_running_threshold).state) {
                id(script_pause_electrolyse).execute();
                id(script_init_electrolyseur).execute();
              } else {
                id(electrolyse_running_time) += 5;
                ESP_LOGI("electrolyse", "Fonctionnement: %d min / Seuil: %.0f min",
                  id(electrolyse_running_time), id(electrolyse_running_threshold).state);
              }

      # 00h00 : reset compteur filtration journalier
      - seconds: 0
        minutes: 0
        hours: 0
        then:
          - lambda: 'id(_temps_fonctionnement_ppe_piscine_jour).reset();'

      # 00h05 : extinction automatique
      - seconds: 0
        minutes: 5
        hours: 0
        then:
          if:
            condition:
              time.has_time:
            then:
              - script.execute: script_shutdown
            else:
              - logger.log:
                  format: "SHUTDOWN: heure non synchronisée, extinction annulée"
                  level: WARN
