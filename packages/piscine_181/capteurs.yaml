# packages/piscine_181/capteurs.yaml
# Capteurs physiques et dérivés
#
# IDs exportés :
#   production_solaire              -> filtration.yaml
#   bme280_temperature              -> hors_gel.yaml (temp_ext)
#   temp_piscine                    -> filtration.yaml
#   pression_filtre                 -> hors_gel.yaml (analog_threshold)
#   pool_pump_relay                 -> ppe_filt_en_fonctionnement (binary_sensor)
#   ppe_filt_en_fonctionnement      -> duty_time
#   _temps_fonctionnement_ppe_piscine_jour -> piscine-181.yaml (reset 00h00)
#   aff_heure_filtration            -> filtration.yaml, pompe.yaml
#   ${friendly_name}_text_sensor_shutdown  -> piscine-181.yaml
#   ${friendly_name}_text_in_sync          -> piscine-181.yaml

binary_sensor:
  - platform: status
    name: "ESP Piscine Status"

  # Etat pompe basé sur le relais physique -> alimente le duty_time
  - platform: template
    name: "Ppe_en_fonctionnement"
    id: ppe_filt_en_fonctionnement
    lambda: 'return id(pool_pump_relay).state;'

sensor:
  # Production solaire HA -> condition démarrage modes Classique/Abaque
  - platform: homeassistant
    name: "Production Solaire"
    id: production_solaire
    entity_id: sensor.envoy_122028037777_current_power_production
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters:
      - filter_out: nan

  # BME280 @ 0x76 - Ambiance extérieure
  # bme280_temperature = temp_ext pour hors_gel.yaml
  - platform: bme280_i2c
    temperature:
      name: "Temperature Exterieur"
      id: bme280_temperature
      oversampling: 16x
      filters:
        - median
    pressure:
      name: "BME280 Pressure"
      id: bme280_pressure
      filters:
        - median
    humidity:
      name: "BME280 Humidity"
      id: bme280_humidity
      filters:
        - median
    address: 0x76
    update_interval: 60s

  - platform: absolute_humidity
    name: "Absolute Humidity"
    temperature: bme280_temperature
    humidity: bme280_humidity
    filters:
      - round: 2

  - platform: template
    name: "Dew Point"
    unit_of_measurement: "°C"
    icon: mdi:thermometer-alert
    accuracy_decimals: 2
    filters:
      - round: 2
    lambda: |-
      float H = id(bme280_humidity).state;
      float T = id(bme280_temperature).state;
      return 243.5 * (log(H/100.0) + 17.67*T/(243.5+T))
                   / (17.67 - log(H/100.0) - 17.67*T/(243.5+T));

  # Dallas GPIO13 - T° eau piscine -> g_memoire_temp_eau (filtration.yaml)
  - platform: dallas_temp
    name: "T° Piscine"
    id: temp_piscine
    address: 0x67041663d082ff28
    resolution: 10
    update_interval: 120s
    icon: mdi:pool-thermometer
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - filter_out: nan
      - filter_out: 85.0
      - round: 1

  # ADS1115 ch A2 - Tension brute capteur pression (mV)
  - platform: ads1115
    multiplexer: 'A2_GND'
    name: "ADS1115 Channel A2-GND"
    id: ${friendly_name}_adc_pression_filtre
    gain: 4.096
    resolution: 16 bits
    update_interval: 30s
    device_class: voltage
    state_class: measurement
    icon: mdi:gauge
    unit_of_measurement: mV
    disabled_by_default: true
    filters:
      - multiply: 1000
      - clamp:
          min_value: 0
          max_value: 3300
          ignore_out_of_range: false
      - round: 0

  # Pression filtre calculée (Bar)
  # Capteur 30PSI: 0.5V=0bar / 4.5V=2.07bar
  # id "pression_filtre" requis par hors_gel.yaml
  - platform: template
    id: pression_filtre
    name: "Pression filtre"
    unit_of_measurement: "Bar"
    accuracy_decimals: 2
    update_interval: 30s
    lambda: 'return fabs(id(${friendly_name}_adc_pression_filtre).state);'
    filters:
      - calibrate_linear:
          method: least_squares
          datapoints:
            - 0   -> 0.0
            - 520 -> 0.4
            - 683 -> 0.6
            - 876 -> 0.68
      - exponential_moving_average:
          alpha: 0.1
          send_every: 2
      - round: 2

  # Compteur temps filtration journalier - reset à 00h00 (piscine-181.yaml)
  - platform: duty_time
    id: _temps_fonctionnement_ppe_piscine_jour
    name: temps_ma_ppe_piscine_jour
    sensor: ppe_filt_en_fonctionnement
    restore: true
    filters:
      - round: 0

text_sensor:
  # Plage horaire active : "HH:MM / pivot / HH:MM" ou "Ma_force" / "At_force"
  - platform: template
    id: aff_heure_filtration
    name: affich_heure_filtration
    icon: mdi:timer

  - platform: template
    id: ${friendly_name}_text_sensor_shutdown
    name: "Auto-shutdown All Relay at"
    icon: mdi:power
    update_interval: never
    entity_category: diagnostic

  - platform: template
    id: ${friendly_name}_text_in_sync
    name: "Time Sync"
    icon: mdi:timer-sync
    update_interval: never
    entity_category: diagnostic
