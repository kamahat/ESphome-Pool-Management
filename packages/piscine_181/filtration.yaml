# ============================================================
# pack_181/filtration.yaml
# Gestion des modes de filtration (Palier, Classique, Abaque, Horaire, Ma_f, At_f)
#
# Principe:
#   - Toutes les 5s: _fonctionnement_filtration recalcule la durée
#     selon le mode sélectionné et la T° eau mémorisée
#   - _calcul_hdebut_hfin: calcule h_debut et h_fin autour de heure_pivot
#   - _calcul_ma_at_ppe_filtration: compare l'heure courante à h_debut/h_fin
#     et commande le switch cde_ppe_filtration
#   - _memorisation_temperature_eau: ne mémorise la T° eau que si
#     la pompe tourne ET que la tempo de recirculation est écoulée
#
# Dépendances:
#   - sensor id: temp_piscine              (capteurs.yaml)
#   - switch id: cde_ppe_filtration        (pompe.yaml)
#   - switch id: ent_at_force              (pompe.yaml)
#   - global id: g_flag_hg                 (hors_gel.yaml)
#   - global id: flag_tempo_ppe_filtre     (ici + script_demarrer_pompe dans pompe.yaml)
#   - text_sensor id: aff_heure_filtration (capteurs.yaml)
#   - time id: ha_time                     (fichier principal)
# ============================================================

globals:
  # T° eau mémorisée au démarrage (valide après tempo recirculation)
  - id: g_memoire_temp_eau
    type: float
    restore_value: yes
    initial_value: '25'

  # Flag: true = tempo recirculation écoulée, T° eau utilisable
  - id: flag_tempo_ppe_filtre
    type: bool
    restore_value: no
    initial_value: 'false'

  # Durée de filtration calculée (en heures)
  - id: g_tps_filtration
    type: float
    restore_value: no
    initial_value: '8'

  # Limites durée filtration (en heures)
  - id: g_temps_max_filtration
    type: float
    initial_value: '23'
  - id: g_temps_min_filtration
    type: float
    initial_value: '5'

  # --- Seuils et durées pour le mode Palier ---
  # Volume piscine ~50m³, pompe 12m³/h => 1 cycle = 4.2h
  - id: g_temp_palier1   # T < 10°C
    type: float
    initial_value: '10'
  - id: g_temp_palier2   # T < 15°C
    type: float
    initial_value: '15'
  - id: g_temp_palier3   # T < 20°C
    type: float
    initial_value: '20'
  - id: g_temp_palier4   # T < 25°C
    type: float
    initial_value: '25'
  - id: g_tps_palier1    # 1h
    type: float
    initial_value: '1'
  - id: g_tps_palier2    # 4h
    type: float
    initial_value: '4'
  - id: g_tps_palier3    # 8h
    type: float
    initial_value: '8'
  - id: g_tps_palier4    # 12h
    type: float
    initial_value: '12'
  - id: g_tps_palier5    # 14h (T >= 25°C)
    type: float
    initial_value: '14'

  # --- Coefficients mode Abaque: f(T) = a*T³ + b*T² + c*T + d ---
  - id: g_abaque_a
    type: float
    initial_value: '0.00335'
  - id: g_abaque_b
    type: float
    initial_value: '-0.14953'
  - id: g_abaque_c
    type: float
    initial_value: '2.43489'
  - id: g_abaque_d
    type: float
    initial_value: '-10.72859'

  # Variables intermédiaires pour les calculs d'heures
  - id: g_hh
    type: int
    initial_value: '0'
  - id: g_mm
    type: int
    initial_value: '0'
  - id: g_ss
    type: int
    initial_value: '0'

# ============================================================
# SELECT - Choix du mode de fonctionnement
# ============================================================
select:
  - platform: template
    name: "Mode_Fonctionnement_filtration"
    id: _Mode_Fonctionnement_filtration
    optimistic: true
    restore_value: true
    options:
      - Palier    # Durée par tranches de T° eau
      - Classique # Durée = T°/2, borné entre 5h et 23h
      - Abaque    # Durée = polynôme cubique f(T°)
      - Horaire   # Plage fixe (h_debut + duree_mode_horaire)
      - Ma_f      # Marche forcée continue
      - At_f      # Arrêt forcé
    on_value:
      then:
        - script.execute: _fonctionnement_filtration
        - logger.log:
            format: "FILTRATION: Mode -> %s"
            args: [ 'id(_Mode_Fonctionnement_filtration).current_option()' ]
            level: INFO

# ============================================================
# DATETIME - Plages horaires
# ============================================================
datetime:
  # Heure pivot: centre de la plage de filtration
  - platform: template
    id: heure_pivot
    type: time
    name: heure_pivot
    optimistic: yes
    initial_value: "13:30:00"
    restore_value: true

  # Heure de début calculée (lecture seule dans HA)
  - platform: template
    id: h_debut
    type: time
    name: h_debut
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  # Heure de fin calculée (lecture seule dans HA)
  - platform: template
    id: h_fin
    type: time
    name: h_fin
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  # Durée de filtration calculée (lecture seule)
  - platform: template
    id: duree_filtration_calc
    type: time
    name: duree_filtration
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  # Mode Horaire: heure de début configurable
  - platform: template
    id: debut_mode_horaire
    type: time
    name: debut_mode_horaire
    optimistic: yes
    initial_value: "08:00:00"
    restore_value: true

  # Mode Horaire: durée configurable
  - platform: template
    id: duree_mode_horaire
    type: time
    name: duree_mode_horaire
    optimistic: yes
    initial_value: "08:00:00"
    restore_value: true

# ============================================================
# NUMBER - Paramètres de filtration
# ============================================================
number:
  # Temps de recirculation avant validation de la T° eau
  - platform: template
    name: tempo_recirculation
    id: tempo_mesure_temp
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 900
    unit_of_measurement: "s"
    step: 10
    icon: mdi:clock
    initial_value: 120

  # Coefficient multiplicateur de la durée calculée (%)
  - platform: template
    name: coeff_Filtration
    id: coeff_filtration
    optimistic: true
    restore_value: true
    mode: box
    min_value: 50
    max_value: 150
    unit_of_measurement: "%"
    step: 5
    icon: mdi:percent
    initial_value: 100

  # Durée de l'arrêt journalier (bouton BP_arret_jour)
  - platform: template
    name: "Durée-Arret_jour"
    id: duree_at_jour
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 24
    unit_of_measurement: "h"
    step: 0.5
    initial_value: 4

  # Seuil de production solaire pour autoriser le démarrage pompe
  # Utilisé uniquement en modes Classique et Abaque
  # 0 W = désactivé (la pompe démarre sans condition solaire)
  - platform: template
    name: "Seuil solaire filtration"
    id: seuil_solaire
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 5000
    unit_of_measurement: "W"
    step: 50
    icon: mdi:solar-power
    initial_value: 1000

# ============================================================
# BUTTON
# ============================================================
button:
  # Stoppe la filtration pour la durée de duree_at_jour
  - platform: template
    name: BP_arret_jour
    id: _arret_jour
    on_press:
      then:
        - switch.template.publish:
            id: ent_at_force
            state: ON
        - logger.log:
            format: "FILTRATION: Arret jour DEBUT (%.1f h)"
            args: [ 'id(duree_at_jour).state' ]
            level: INFO
        - delay: !lambda "return id(duree_at_jour).state * 3600 * 1000;"
        - switch.template.publish:
            id: ent_at_force
            state: OFF
        - logger.log:
            format: "FILTRATION: Arret jour FIN"
            level: INFO

# ============================================================
# INTERVAL
# ============================================================
interval:
  - interval: 5s
    then:
      - script.execute: _fonctionnement_filtration
      - script.execute: _memorisation_temperature_eau

# ============================================================
# SCRIPTS
# ============================================================
script:
  # -------------------------------------------------------
  # Mémorisation T° eau
  # -------------------------------------------------------
  - id: _memorisation_temperature_eau
    then:
      - if:
          condition:
            lambda: 'return id(flag_tempo_ppe_filtre) == true;'
          then:
            - lambda: |-
                if (!isnan(id(temp_piscine).state)) {
                  id(g_memoire_temp_eau) = id(temp_piscine).state;
                }
      - logger.log:
          format: "TEMP: Flag=%i / Dallas=%.2f°C / Memo=%.2f°C"
          args: [ 'id(flag_tempo_ppe_filtre)', 'id(temp_piscine).state', 'id(g_memoire_temp_eau)' ]
          level: DEBUG

  # -------------------------------------------------------
  # Calcul durée filtration + commande pompe
  # -------------------------------------------------------
  - id: _fonctionnement_filtration
    then:
      # P1: Arrêt forcé manuel
      - if:
          condition:
            lambda: 'return id(ent_at_force).state == true;'
          then:
            - switch.turn_off: cde_ppe_filtration

      # P2: Mode hors gel (hors_gel.yaml)
      - if:
          condition:
            lambda: 'return id(g_flag_hg) == true;'
          then:
            - switch.turn_on: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Hors-Gel");'
            - logger.log:
                format: "FILTRATION: Hors-Gel -> Pompe ON"
                level: INFO

      # P3: Mode At_f
      - if:
          condition:
            - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "At_f";'
            - lambda: 'return id(ent_at_force).state == false;'
            - lambda: 'return id(g_flag_hg) == false;'
          then:
            - switch.turn_off: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("At_force");'

      # P4: Mode Ma_f
      - if:
          condition:
            - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Ma_f";'
            - lambda: 'return id(ent_at_force).state == false;'
            - lambda: 'return id(g_flag_hg) == false;'
          then:
            - switch.turn_on: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Ma_force");'

      # P5: Mode Palier
      - if:
          condition:
            - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Palier";'
            - lambda: 'return id(ent_at_force).state == false;'
            - lambda: 'return id(g_flag_hg) == false;'
          then:
            - lambda: |-
                float t = id(g_memoire_temp_eau);
                if      (t < id(g_temp_palier1))  id(g_tps_filtration) = id(g_tps_palier1);
                else if (t < id(g_temp_palier2))  id(g_tps_filtration) = id(g_tps_palier2);
                else if (t < id(g_temp_palier3))  id(g_tps_filtration) = id(g_tps_palier3);
                else if (t < id(g_temp_palier4))  id(g_tps_filtration) = id(g_tps_palier4);
                else                              id(g_tps_filtration) = id(g_tps_palier5);
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
            - logger.log:
                format: "FILTRATION Palier: T=%.1f°C -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            - script.execute: _calcul_hdebut_hfin

      # P5: Mode Classique
      - if:
          condition:
            - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Classique";'
            - lambda: 'return id(ent_at_force).state == false;'
            - lambda: 'return id(g_flag_hg) == false;'
          then:
            - lambda: |-
                id(g_tps_filtration) = id(g_memoire_temp_eau) / 2.0;
                id(g_tps_filtration) = min(id(g_temps_max_filtration), id(g_tps_filtration));
                id(g_tps_filtration) = max(id(g_temps_min_filtration), id(g_tps_filtration));
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
            - logger.log:
                format: "FILTRATION Classique: T=%.1f°C -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            # Condition solaire: si seuil > 0 et production insuffisante -> pas de filtration
            - if:
                condition:
                  lambda: |-
                    return id(seuil_solaire).state > 0
                        && id(production_solaire).state < id(seuil_solaire).state;
                then:
                  - switch.turn_off: cde_ppe_filtration
                  - logger.log:
                      format: "FILTRATION Classique: Solaire %.0fW < seuil %.0fW -> Pompe OFF"
                      args: [ 'id(production_solaire).state', 'id(seuil_solaire).state' ]
                      level: INFO
                else:
                  - script.execute: _calcul_hdebut_hfin

      # P5: Mode Abaque
      - if:
          condition:
            - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Abaque";'
            - lambda: 'return id(ent_at_force).state == false;'
            - lambda: 'return id(g_flag_hg) == false;'
          then:
            - lambda: |-
                float t = id(g_memoire_temp_eau);
                id(g_tps_filtration) = id(g_abaque_a)*pow(t,3) + id(g_abaque_b)*pow(t,2)
                                     + id(g_abaque_c)*t + id(g_abaque_d);
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
                id(g_tps_filtration) = min(id(g_temps_max_filtration), id(g_tps_filtration));
                id(g_tps_filtration) = max(id(g_temps_min_filtration), id(g_tps_filtration));
            - logger.log:
                format: "FILTRATION Abaque: T=%.1f°C -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            # Condition solaire: si seuil > 0 et production insuffisante -> pas de filtration
            - if:
                condition:
                  lambda: |-
                    return id(seuil_solaire).state > 0
                        && id(production_solaire).state < id(seuil_solaire).state;
                then:
                  - switch.turn_off: cde_ppe_filtration
                  - logger.log:
                      format: "FILTRATION Abaque: Solaire %.0fW < seuil %.0fW -> Pompe OFF"
                      args: [ 'id(production_solaire).state', 'id(seuil_solaire).state' ]
                      level: INFO
                else:
                  - script.execute: _calcul_hdebut_hfin

      # P6: Mode Horaire
      - if:
          condition:
            - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Horaire";'
            - lambda: 'return id(ent_at_force).state == false;'
            - lambda: 'return id(g_flag_hg) == false;'
          then:
            - datetime.time.set:
                id: h_debut
                time: !lambda |-
                  return {second: 0,
                          minute: id(debut_mode_horaire).minute,
                          hour:   id(debut_mode_horaire).hour};
            - datetime.time.set:
                id: h_fin
                time: !lambda |-
                  int total = id(h_debut).hour * 60 + id(h_debut).minute
                            + id(duree_mode_horaire).hour * 60 + id(duree_mode_horaire).minute;
                  return {second: 0,
                          minute: static_cast<uint8_t>(total % 60),
                          hour:   static_cast<uint8_t>((total / 60) % 24)};
            - lambda: |-
                char buf[24];
                snprintf(buf, sizeof(buf), "%02u:%02u -> %02u:%02u",
                  id(h_debut).hour, id(h_debut).minute,
                  id(h_fin).hour,   id(h_fin).minute);
                id(aff_heure_filtration).publish_state(buf);
            - logger.log:
                format: "FILTRATION Horaire: %02u:%02u -> %02u:%02u"
                args: [ 'id(h_debut).hour', 'id(h_debut).minute',
                        'id(h_fin).hour',   'id(h_fin).minute' ]
                level: INFO
            - script.execute: _calcul_ma_at_ppe_filtration

  # -------------------------------------------------------
  # Calcul h_debut / h_fin centrés sur heure_pivot
  # -------------------------------------------------------
  - id: _calcul_hdebut_hfin
    mode: single
    then:
      - datetime.time.set:
          id: heure_pivot
          time: !lambda |-
            return {second: 0,
                    minute: id(heure_pivot).minute,
                    hour:   id(heure_pivot).hour};
      - lambda: |-
          double pivot = id(heure_pivot).hour * 60.0 + id(heure_pivot).minute;
          double debut = pivot - (id(g_tps_filtration) / 2.0 * 60.0);
          if (debut < 0) debut += 24 * 60;
          id(g_hh) = (int)(debut / 60) % 24;
          id(g_mm) = (int)debut % 60;
      - datetime.time.set:
          id: h_debut
          time: !lambda |-
            return {second: 0,
                    minute: static_cast<uint8_t>(id(g_mm)),
                    hour:   static_cast<uint8_t>(id(g_hh))};
      - lambda: |-
          double pivot = id(heure_pivot).hour * 60.0 + id(heure_pivot).minute;
          double fin   = pivot + (id(g_tps_filtration) / 2.0 * 60.0);
          id(g_hh) = (int)(fin / 60) % 24;
          id(g_mm) = (int)fin % 60;
      - datetime.time.set:
          id: h_fin
          time: !lambda |-
            return {second: 0,
                    minute: static_cast<uint8_t>(id(g_mm)),
                    hour:   static_cast<uint8_t>(id(g_hh))};
      - lambda: |-
          CONVERT_SECONDS(id(g_tps_filtration) * 3600, id(g_hh), id(g_mm), id(g_ss));
      - datetime.time.set:
          id: duree_filtration_calc
          time: !lambda |-
            return {second: 0,
                    minute: static_cast<uint8_t>(id(g_mm)),
                    hour:   static_cast<uint8_t>(id(g_hh))};
      - lambda: |-
          char buf[32];
          snprintf(buf, sizeof(buf), "%02u:%02u / %02u:%02u / %02u:%02u",
            id(h_debut).hour,    id(h_debut).minute,
            id(heure_pivot).hour, id(heure_pivot).minute,
            id(h_fin).hour,      id(h_fin).minute);
          id(aff_heure_filtration).publish_state(buf);
      - logger.log:
          format: "FILTRATION: %02u:%02u -> [%02u:%02u] -> %02u:%02u (%.2fh)"
          args: [ 'id(h_debut).hour',    'id(h_debut).minute',
                  'id(heure_pivot).hour', 'id(heure_pivot).minute',
                  'id(h_fin).hour',      'id(h_fin).minute',
                  'id(g_tps_filtration)' ]
          level: INFO
      - script.execute: _calcul_ma_at_ppe_filtration

  # -------------------------------------------------------
  # Décision marche/arrêt pompe selon fenêtre horaire
  # Gère le passage minuit
  # -------------------------------------------------------
  - id: _calcul_ma_at_ppe_filtration
    mode: single
    then:
      - if:
          condition:
            time.has_time:
          else:
            - logger.log:
                format: "FILTRATION: Heure non synchronisée"
                level: WARN
      - if:
          condition:
            - lambda: 'return id(ha_time).now().is_valid();'
            - lambda: |-
                int now   = id(ha_time).now().hour * 60 + id(ha_time).now().minute;
                int debut = id(h_debut).hour * 60 + id(h_debut).minute;
                int fin   = id(h_fin).hour * 60 + id(h_fin).minute;
                if (fin >= debut)
                  return (now >= debut && now < fin);
                else
                  return (now >= debut || now < fin);
          then:
            - switch.turn_on: cde_ppe_filtration
            - logger.log:
                format: "FILTRATION: Plage active -> Pompe ON"
                level: DEBUG
          else:
            - switch.turn_off: cde_ppe_filtration
            - logger.log:
                format: "FILTRATION: Hors plage -> Pompe OFF"
                level: DEBUG
