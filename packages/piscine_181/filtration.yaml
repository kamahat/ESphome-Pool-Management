# packages/piscine_181/filtration.yaml
# Modes de filtration : Palier | Classique | Abaque | Horaire | Ma_f | At_f
#
# Logique toutes les 5s (_fonctionnement_filtration) :
#   P1 ent_at_force ON   -> Pompe OFF
#   P2 g_flag_hg ON      -> Pompe ON  (hors_gel.yaml)
#   P3 At_f              -> Pompe OFF
#   P4 Ma_f              -> Pompe ON
#   P5 Palier/Classique/Abaque -> calcul durée + condition solaire + heure pivot
#   P6 Horaire           -> plage fixe (debut_mode_horaire + duree_mode_horaire)
#
# Condition solaire (modes Classique et Abaque uniquement) :
#   Si seuil_solaire > 0 ET production_solaire < seuil -> Pompe OFF
#   seuil_solaire = 0 désactive la condition (mode dégradé)
#
# Dépendances :
#   sensor     : temp_piscine, production_solaire  (capteurs.yaml)
#   switch     : cde_ppe_filtration, ent_at_force  (pompe.yaml)
#   global     : g_flag_hg                         (hors_gel.yaml)
#   global     : flag_tempo_ppe_filtre              (pompe.yaml)
#   text_sensor: aff_heure_filtration              (capteurs.yaml)
#   time       : ha_time                           (piscine-181.yaml)

globals:
  - id: g_memoire_temp_eau
    type: float
    restore_value: yes
    initial_value: '25'

  - id: flag_tempo_ppe_filtre
    type: bool
    restore_value: no
    initial_value: 'false'

  # Timestamp Unix de la dernière réception d'une T° BLE valide
  # Initialisé à 0 = jamais reçu. Mis à jour par on_value dans capteurs.yaml
  - id: g_ble_temp_last_update
    type: int
    restore_value: no
    initial_value: '0'

  - id: g_tps_filtration   # Durée calculée en heures
    type: float
    restore_value: no
    initial_value: '8'

  - id: g_temps_max_filtration
    type: float
    initial_value: '23'

  - id: g_temps_min_filtration
    type: float
    initial_value: '5'

  # Seuils mode Palier (°C) - Vol ~50m³, pompe 12m³/h => 1 cycle = 4.2h
  - id: g_temp_palier1
    type: float
    initial_value: '10'
  - id: g_temp_palier2
    type: float
    initial_value: '15'
  - id: g_temp_palier3
    type: float
    initial_value: '20'
  - id: g_temp_palier4
    type: float
    initial_value: '25'
  - id: g_tps_palier1
    type: float
    initial_value: '1'
  - id: g_tps_palier2
    type: float
    initial_value: '4'
  - id: g_tps_palier3
    type: float
    initial_value: '8'
  - id: g_tps_palier4
    type: float
    initial_value: '12'
  - id: g_tps_palier5
    type: float
    initial_value: '14'

  # Coefficients mode Abaque : f(T) = a*T³ + b*T² + c*T + d
  - id: g_abaque_a
    type: float
    initial_value: '0.00335'
  - id: g_abaque_b
    type: float
    initial_value: '-0.14953'
  - id: g_abaque_c
    type: float
    initial_value: '2.43489'
  - id: g_abaque_d
    type: float
    initial_value: '-10.72859'

  # Variables intermédiaires partagées entre scripts
  - id: g_hh
    type: int
    initial_value: '0'
  - id: g_mm
    type: int
    initial_value: '0'
  - id: g_ss
    type: int
    initial_value: '0'

select:
  - platform: template
    name: "Mode Fonctionnement Filtration"
    id: _Mode_Fonctionnement_filtration
    optimistic: true
    restore_value: true
    options: [Palier, Classique, Abaque, Horaire, Ma_f, At_f]
    on_value:
      then:
        - script.execute: _fonctionnement_filtration
        - logger.log:
            format: "FILTRATION: Mode -> %s"
            args: [ 'id(_Mode_Fonctionnement_filtration).current_option()' ]
            level: INFO

datetime:
  - platform: template
    id: heure_pivot
    type: time
    name: "Heure Pivot"
    optimistic: yes
    initial_value: "13:30:00"
    restore_value: true

  - platform: template
    id: h_debut
    type: time
    name: "Heure Début Filtration"
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  - platform: template
    id: h_fin
    type: time
    name: "Heure Fin Filtration"
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  - platform: template
    id: duree_filtration_calc
    type: time
    name: "Durée Filtration"
    optimistic: yes
    initial_value: "00:00:00"
    restore_value: false

  - platform: template
    id: debut_mode_horaire
    type: time
    name: "Début Mode Horaire"
    optimistic: yes
    initial_value: "08:00:00"
    restore_value: true

  - platform: template
    id: duree_mode_horaire
    type: time
    name: "Durée Mode Horaire"
    optimistic: yes
    initial_value: "08:00:00"
    restore_value: true

number:
  - platform: template
    name: "Tempo Recirculation"
    id: tempo_mesure_temp
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 900
    unit_of_measurement: "s"
    step: 10
    icon: mdi:clock
    initial_value: 120

  - platform: template
    name: "Coefficient Filtration"
    id: coeff_filtration
    optimistic: true
    restore_value: true
    mode: box
    min_value: 50
    max_value: 150
    unit_of_measurement: "%"
    step: 5
    icon: mdi:percent
    initial_value: 100

  - platform: template
    name: "Durée Arrêt Journalier"
    id: duree_at_jour
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 24
    unit_of_measurement: "h"
    step: 0.5
    initial_value: 4

  # Seuil solaire pour modes Classique/Abaque (0 = désactivé)
  - platform: template
    name: "Seuil Solaire Filtration"
    id: seuil_solaire
    optimistic: true
    restore_value: true
    mode: box
    min_value: 0
    max_value: 5000
    unit_of_measurement: "W"
    step: 50
    icon: mdi:solar-power
    initial_value: 1000

button:
  - platform: template
    name: "Arrêt Filtration Journée"
    id: _arret_jour
    on_press:
      then:
        - switch.template.publish:
            id: ent_at_force
            state: ON
        - logger.log:
            format: "FILTRATION: Arret jour %.1f h"
            args: [ 'id(duree_at_jour).state' ]
            level: INFO
        - delay: !lambda "return id(duree_at_jour).state * 3600000;"
        - switch.template.publish:
            id: ent_at_force
            state: OFF
        - logger.log:
            format: "FILTRATION: Fin arret jour"
            level: INFO

interval:
  - interval: 5s
    then:
      - script.execute: _fonctionnement_filtration
      - script.execute: _memorisation_temperature_eau

script:
  # Sélection de la source de T° eau et mémorisation dans g_memoire_temp_eau
  #
  # Priorité :
  #   Pompe ON + tempo écoulée  -> Dallas (mesure en circuit, plus fiable)
  #   Pompe OFF + BLE < 1h      -> BLE Blue Connect (eau au repos, valide)
  #   Pompe OFF + BLE >= 1h     -> conservation de la dernière valeur mémorisée
  - id: _memorisation_temperature_eau
    then:
      - if:
          # CAS 1 : pompe en marche et T° eau stabilisée après recirculation
          condition:
            lambda: 'return id(flag_tempo_ppe_filtre) && !isnan(id(temp_piscine).state);'
          then:
            - lambda: 'id(g_memoire_temp_eau) = id(temp_piscine).state;'
            - logger.log:
                format: "TEMP: Source=Dallas / T°=%.1f°C"
                args: [ 'id(g_memoire_temp_eau)' ]
                level: DEBUG
          else:
            # CAS 2 : pompe arrêtée -> BLE si valeur fraîche (< 3600s)
            - if:
                condition:
                  lambda: |-
                    if (isnan(id(temp_eau_ble).state)) return false;
                    if (!id(ha_time).now().is_valid())  return false;
                    if (id(g_ble_temp_last_update) == 0) return false;
                    int age = id(ha_time).now().timestamp - id(g_ble_temp_last_update);
                    return age < 3600;
                then:
                  - lambda: 'id(g_memoire_temp_eau) = id(temp_eau_ble).state;'
                  - logger.log:
                      format: "TEMP: Source=BLE / T°=%.1f°C / Age=%ds"
                      args: [ 'id(g_memoire_temp_eau)',
                              'id(ha_time).now().timestamp - id(g_ble_temp_last_update)' ]
                      level: DEBUG
                else:
                  - logger.log:
                      format: "TEMP: BLE indisponible ou trop ancienne -> conservation %.1f°C"
                      args: [ 'id(g_memoire_temp_eau)' ]
                      level: DEBUG

  # Calcul durée + décision pompe selon le mode actif
  - id: _fonctionnement_filtration
    then:
      # P1 - Arrêt forcé manuel
      - if:
          condition:
            lambda: 'return id(ent_at_force).state;'
          then:
            - switch.turn_off: cde_ppe_filtration

      # P2 - Hors gel (hors_gel.yaml)
      - if:
          condition:
            lambda: 'return id(g_flag_hg);'
          then:
            - switch.turn_on: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Hors-Gel");'

      # P3 - At_f
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "At_f";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg);'
          then:
            - switch.turn_off: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("At_force");'

      # P4 - Ma_f
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Ma_f";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg);'
          then:
            - switch.turn_on: cde_ppe_filtration
            - lambda: 'id(aff_heure_filtration).publish_state("Ma_force");'

      # P5 - Palier
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Palier";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg);'
          then:
            - lambda: |-
                float t = id(g_memoire_temp_eau);
                if      (t < id(g_temp_palier1)) id(g_tps_filtration) = id(g_tps_palier1);
                else if (t < id(g_temp_palier2)) id(g_tps_filtration) = id(g_tps_palier2);
                else if (t < id(g_temp_palier3)) id(g_tps_filtration) = id(g_tps_palier3);
                else if (t < id(g_temp_palier4)) id(g_tps_filtration) = id(g_tps_palier4);
                else                             id(g_tps_filtration) = id(g_tps_palier5);
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
            - logger.log:
                format: "FILTRATION Palier: T=%.1f°C -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            - script.execute: _calcul_hdebut_hfin

      # P5 - Classique (T/2) + condition solaire
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Classique";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg);'
          then:
            - lambda: |-
                id(g_tps_filtration) = id(g_memoire_temp_eau) / 2.0;
                id(g_tps_filtration) = min(id(g_temps_max_filtration), max(id(g_temps_min_filtration), id(g_tps_filtration)));
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
            - logger.log:
                format: "FILTRATION Classique: T=%.1f°C -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            - if:
                condition:
                  lambda: 'return id(seuil_solaire).state > 0 && id(production_solaire).state < id(seuil_solaire).state;'
                then:
                  - switch.turn_off: cde_ppe_filtration
                  - logger.log:
                      format: "FILTRATION Classique: Solaire %.0fW < seuil %.0fW -> Pompe OFF"
                      args: [ 'id(production_solaire).state', 'id(seuil_solaire).state' ]
                      level: INFO
                else:
                  - script.execute: _calcul_hdebut_hfin

      # P5 - Abaque (polynôme cubique) + condition solaire
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Abaque";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg);'
          then:
            - lambda: |-
                float t = id(g_memoire_temp_eau);
                id(g_tps_filtration) = id(g_abaque_a)*pow(t,3) + id(g_abaque_b)*pow(t,2)
                                     + id(g_abaque_c)*t + id(g_abaque_d);
                id(g_tps_filtration) *= id(coeff_filtration).state / 100.0;
                id(g_tps_filtration) = min(id(g_temps_max_filtration), max(id(g_temps_min_filtration), id(g_tps_filtration)));
            - logger.log:
                format: "FILTRATION Abaque: T=%.1f°C -> %.2fh"
                args: [ 'id(g_memoire_temp_eau)', 'id(g_tps_filtration)' ]
                level: INFO
            - if:
                condition:
                  lambda: 'return id(seuil_solaire).state > 0 && id(production_solaire).state < id(seuil_solaire).state;'
                then:
                  - switch.turn_off: cde_ppe_filtration
                  - logger.log:
                      format: "FILTRATION Abaque: Solaire %.0fW < seuil %.0fW -> Pompe OFF"
                      args: [ 'id(production_solaire).state', 'id(seuil_solaire).state' ]
                      level: INFO
                else:
                  - script.execute: _calcul_hdebut_hfin

      # P6 - Horaire (plage fixe)
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_filtration).current_option() == "Horaire";'
              - lambda: 'return !id(ent_at_force).state && !id(g_flag_hg);'
          then:
            - datetime.time.set:
                id: h_debut
                time: !lambda |-
                  return {second: 0, minute: id(debut_mode_horaire).minute,
                          hour: id(debut_mode_horaire).hour};
            - datetime.time.set:
                id: h_fin
                time: !lambda |-
                  int total = id(h_debut).hour * 60 + id(h_debut).minute
                            + id(duree_mode_horaire).hour * 60 + id(duree_mode_horaire).minute;
                  return {second: 0, minute: static_cast<uint8_t>(total % 60),
                          hour: static_cast<uint8_t>((total / 60) % 24)};
            - lambda: |-
                char buf[24];
                snprintf(buf, sizeof(buf), "%02u:%02u -> %02u:%02u",
                  id(h_debut).hour, id(h_debut).minute,
                  id(h_fin).hour,   id(h_fin).minute);
                id(aff_heure_filtration).publish_state(buf);
            - script.execute: _calcul_ma_at_ppe_filtration

  # Calcule h_debut et h_fin centrés sur heure_pivot
  - id: _calcul_hdebut_hfin
    mode: single
    then:
      - datetime.time.set:
          id: heure_pivot
          time: !lambda |-
            return {second: 0, minute: id(heure_pivot).minute, hour: id(heure_pivot).hour};
      - lambda: |-
          double p = id(heure_pivot).hour * 60.0 + id(heure_pivot).minute;
          double d = p - id(g_tps_filtration) * 30.0;  // /2*60 = *30
          if (d < 0) d += 1440;
          id(g_hh) = (int)(d / 60) % 24;
          id(g_mm) = (int)d % 60;
      - datetime.time.set:
          id: h_debut
          time: !lambda |-
            return {second: 0, minute: static_cast<uint8_t>(id(g_mm)),
                    hour: static_cast<uint8_t>(id(g_hh))};
      - lambda: |-
          double p = id(heure_pivot).hour * 60.0 + id(heure_pivot).minute;
          double f = p + id(g_tps_filtration) * 30.0;
          id(g_hh) = (int)(f / 60) % 24;
          id(g_mm) = (int)f % 60;
      - datetime.time.set:
          id: h_fin
          time: !lambda |-
            return {second: 0, minute: static_cast<uint8_t>(id(g_mm)),
                    hour: static_cast<uint8_t>(id(g_hh))};
      - lambda: 'CONVERT_SECONDS(id(g_tps_filtration) * 3600, id(g_hh), id(g_mm), id(g_ss));'
      - datetime.time.set:
          id: duree_filtration_calc
          time: !lambda |-
            return {second: 0, minute: static_cast<uint8_t>(id(g_mm)),
                    hour: static_cast<uint8_t>(id(g_hh))};
      - lambda: |-
          char buf[32];
          snprintf(buf, sizeof(buf), "%02u:%02u / %02u:%02u / %02u:%02u",
            id(h_debut).hour, id(h_debut).minute,
            id(heure_pivot).hour, id(heure_pivot).minute,
            id(h_fin).hour, id(h_fin).minute);
          id(aff_heure_filtration).publish_state(buf);
      - logger.log:
          format: "FILTRATION: %02u:%02u -[%02u:%02u]- %02u:%02u (%.2fh)"
          args: [ 'id(h_debut).hour', 'id(h_debut).minute',
                  'id(heure_pivot).hour', 'id(heure_pivot).minute',
                  'id(h_fin).hour', 'id(h_fin).minute', 'id(g_tps_filtration)' ]
          level: INFO
      - script.execute: _calcul_ma_at_ppe_filtration

  # Compare l'heure courante à la fenêtre h_debut/h_fin -> commande pompe
  - id: _calcul_ma_at_ppe_filtration
    mode: single
    then:
      - if:
          condition:
            time.has_time:
          else:
            - logger.log:
                format: "FILTRATION: heure non sync, pompe inchangée"
                level: WARN
      - if:
          condition:
            - lambda: 'return id(ha_time).now().is_valid();'
            - lambda: |-
                int now   = id(ha_time).now().hour * 60 + id(ha_time).now().minute;
                int debut = id(h_debut).hour * 60 + id(h_debut).minute;
                int fin   = id(h_fin).hour   * 60 + id(h_fin).minute;
                return (fin >= debut) ? (now >= debut && now < fin)
                                      : (now >= debut || now < fin);
          then:
            - switch.turn_on: cde_ppe_filtration
          else:
            - switch.turn_off: cde_ppe_filtration
