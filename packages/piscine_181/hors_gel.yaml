# packages/piscine_181/hors_gel.yaml
# Protection antigel + alarme pression filtre
#
# temp_ext = bme280_temperature (BME280 ambiant - capteurs.yaml)
# Testé toutes les 15 min ; g_flag_hg lu par filtration.yaml (priorité P2)
# Events HA "esphome.piscine_alarme" -> créer automation pour notifications
#
# Seuil1 : T < S1            -> pompe ON 15 min (risque léger)
# Seuil2 : T < S2 (< S1)    -> pompe ON 30 min (risque sévère)
#
# Alarme pression : analog_threshold sur pression_filtre (capteurs.yaml)
# Seuil = ${pression_max} (défini dans substitutions piscine-181.yaml)

globals:
  - id: g_flag_hg
    type: bool
    restore_value: yes
    initial_value: 'false'

select:
  - platform: template
    name: "Mode_Hors_Gel"
    id: _Mode_Fonctionnement_hg
    optimistic: true
    restore_value: true
    options:
      - Desactivé
      - Activé
    on_value:
      then:
        - logger.log:
            format: "HORS-GEL: Mode -> %s"
            args: [ 'id(_Mode_Fonctionnement_hg).current_option()' ]
            level: INFO

number:
  - platform: template
    name: "Seuil1_Temp_HG"
    id: s1_temp_hg
    optimistic: true
    restore_value: true
    mode: box
    min_value: -5
    max_value: 3
    device_class: temperature
    unit_of_measurement: "°C"
    step: 0.1
    initial_value: 1.0

  - platform: template
    name: "Seuil2_Temp_HG"
    id: s2_temp_hg
    optimistic: true
    restore_value: true
    mode: box
    min_value: -10
    max_value: 0
    device_class: temperature
    unit_of_measurement: "°C"
    step: 0.1
    initial_value: -2.0

binary_sensor:
  # Alarme pression filtre
  - platform: analog_threshold
    name: "Etat_pression_Filtre"
    id: _etat_pression_filtre
    sensor_id: pression_filtre
    threshold: ${pression_max}
    on_press:
      - logger.log:
          format: "ALARME: Pression filtre HAUTE > %.1f bar (%.3f bar)"
          args: [ 'float(${pression_max})', 'id(pression_filtre).state' ]
          level: WARN
      - homeassistant.event:
          event: esphome.piscine_alarme
          data:
            type: pression_haute
            valeur: !lambda 'return std::to_string(id(pression_filtre).state);'
    on_release:
      - logger.log:
          format: "INFO: Pression filtre normale (%.3f bar)"
          args: [ 'id(pression_filtre).state' ]
          level: INFO
      - homeassistant.event:
          event: esphome.piscine_alarme
          data:
            type: pression_normale
            valeur: !lambda 'return std::to_string(id(pression_filtre).state);'

interval:
  - interval: 900s
    then:
      - script.execute: _fonction_hors_gel

script:
  - id: _fonction_hors_gel
    then:
      # T > S1 : aucun risque, on lève le flag si positionné
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_hg).current_option() == "Activé";'
              - lambda: 'return id(bme280_temperature).state > id(s1_temp_hg).state;'
          then:
            - lambda: 'id(g_flag_hg) = false;'
            - logger.log:
                format: "HORS-GEL: T=%.1f°C > S1=%.1f°C -> OK"
                args: [ 'id(bme280_temperature).state', 'id(s1_temp_hg).state' ]
                level: DEBUG

      # S2 < T < S1 : risque léger -> pompe 15 min
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_hg).current_option() == "Activé";'
              - lambda: 'return id(bme280_temperature).state < id(s1_temp_hg).state;'
              - lambda: 'return id(bme280_temperature).state > id(s2_temp_hg).state;'
              - lambda: 'return !id(g_flag_hg);'
          then:
            - lambda: 'id(g_flag_hg) = true;'
            - logger.log:
                format: "HORS-GEL: S1 - T=%.1f°C -> Pompe ON 15 min"
                args: [ 'id(bme280_temperature).state' ]
                level: WARN
            - homeassistant.event:
                event: esphome.piscine_alarme
                data:
                  type: hors_gel_seuil1_debut
                  temp: !lambda 'return std::to_string(id(bme280_temperature).state);'
            - delay: 900s
            - lambda: 'id(g_flag_hg) = false;'
            - homeassistant.event:
                event: esphome.piscine_alarme
                data:
                  type: hors_gel_seuil1_fin
                  temp: !lambda 'return std::to_string(id(bme280_temperature).state);'

      # T < S2 : risque sévère -> pompe 30 min
      - if:
          condition:
            and:
              - lambda: 'return id(_Mode_Fonctionnement_hg).current_option() == "Activé";'
              - lambda: 'return id(bme280_temperature).state < id(s2_temp_hg).state;'
              - lambda: 'return !id(g_flag_hg);'
          then:
            - lambda: 'id(g_flag_hg) = true;'
            - logger.log:
                format: "HORS-GEL: S2 - T=%.1f°C -> Pompe ON 30 min (GEL SEVERE)"
                args: [ 'id(bme280_temperature).state' ]
                level: ERROR
            - homeassistant.event:
                event: esphome.piscine_alarme
                data:
                  type: hors_gel_seuil2_debut
                  temp: !lambda 'return std::to_string(id(bme280_temperature).state);'
            - delay: 1800s
            - lambda: 'id(g_flag_hg) = false;'
            - homeassistant.event:
                event: esphome.piscine_alarme
                data:
                  type: hors_gel_seuil2_fin
                  temp: !lambda 'return std::to_string(id(bme280_temperature).state);'
